<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Dengler Family — An American Family History</title>
  <meta name="description" content="An interactive ancestor tree of the Dengler family, researched from public records." />

  <!-- Google Fonts (only permitted external dependency) with graceful serif fallbacks. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <!-- Precompiled Tailwind, then heirloom detailing on top. All paths relative. -->
  <link rel="stylesheet" href="css/tailwind.css?v=20260707n" />
  <link rel="stylesheet" href="css/custom.css?v=20260707n" />
</head>
<body class="bg-paper text-ink font-body antialiased">

  <a href="#tree-root" class="skip-link">Skip to the family tree</a>

  <!-- ============ Unlock gate (numeric passcode) ============ -->
  <div id="gate" class="gate">
    <div id="gate-card" class="gate-card passcode-card">
      <div class="header-fleuron" aria-hidden="true">❦</div>
      <h1 class="font-display gate-title">The Dengler Family Archive</h1>
      <div class="header-rule" aria-hidden="true">
        <span class="rule-line"></span>
        <span class="rule-mark">❧</span>
        <span class="rule-line"></span>
      </div>
      <p class="gate-note">Enter passcode</p>

      <!-- Progress dots (count injected from PASSCODE_LENGTH) -->
      <div id="passcode-dots" class="passcode-dots" role="status" aria-live="polite" aria-label="Passcode, 0 digits entered"></div>

      <p id="gate-error" class="gate-error" role="alert" aria-live="assertive" hidden>Wrong passcode</p>

      <!-- iOS-style numeric keypad -->
      <div id="passcode-keypad" class="passcode-keypad" role="group" aria-label="Numeric keypad">
        <button type="button" class="key" data-digit="1" aria-label="1"><span class="key-digit">1</span></button>
        <button type="button" class="key" data-digit="2" aria-label="2"><span class="key-digit">2</span><span class="key-letters" aria-hidden="true">ABC</span></button>
        <button type="button" class="key" data-digit="3" aria-label="3"><span class="key-digit">3</span><span class="key-letters" aria-hidden="true">DEF</span></button>
        <button type="button" class="key" data-digit="4" aria-label="4"><span class="key-digit">4</span><span class="key-letters" aria-hidden="true">GHI</span></button>
        <button type="button" class="key" data-digit="5" aria-label="5"><span class="key-digit">5</span><span class="key-letters" aria-hidden="true">JKL</span></button>
        <button type="button" class="key" data-digit="6" aria-label="6"><span class="key-digit">6</span><span class="key-letters" aria-hidden="true">MNO</span></button>
        <button type="button" class="key" data-digit="7" aria-label="7"><span class="key-digit">7</span><span class="key-letters" aria-hidden="true">PQRS</span></button>
        <button type="button" class="key" data-digit="8" aria-label="8"><span class="key-digit">8</span><span class="key-letters" aria-hidden="true">TUV</span></button>
        <button type="button" class="key" data-digit="9" aria-label="9"><span class="key-digit">9</span><span class="key-letters" aria-hidden="true">WXYZ</span></button>
        <span class="key key-blank" aria-hidden="true"></span>
        <button type="button" class="key" data-digit="0" aria-label="0"><span class="key-digit">0</span></button>
        <button type="button" id="key-delete" class="key key-action" data-action="delete" aria-label="Delete"><span class="key-glyph" aria-hidden="true">⌫</span></button>
      </div>

      <label class="gate-remember" for="gate-remember">
        <input type="checkbox" id="gate-remember" /> Remember this device
      </label>
    </div>
  </div>

  <div class="page-frame" hidden>
    <!-- ============ Compact app bar ============ -->
    <header class="app-bar">
      <div class="app-brand">
        <span class="app-fleuron" aria-hidden="true">❦</span>
        <span class="app-titles">
          <span id="tree-title" class="app-title font-display">The Dengler Family</span>
          <span id="tree-subtitle" class="app-subtitle">An American Family History</span>
        </span>
      </div>

      <div class="controls">
        <div class="search-wrap">
          <label for="search-input" class="sr-only">Search for a family member</label>
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input
            id="search-input"
            type="text"
            class="search-input"
            placeholder="Search a name…"
            autocomplete="off"
            role="combobox"
            aria-expanded="false"
            aria-controls="search-results"
            aria-autocomplete="list"
            aria-haspopup="listbox"
          />
          <ul id="search-results" class="search-results" role="listbox" aria-label="Search results" hidden></ul>
        </div>

        <button id="theme-toggle" type="button" class="theme-toggle" aria-pressed="false" aria-label="Switch to dark theme">
          <span class="theme-icon theme-icon-sun" aria-hidden="true">☀</span>
          <span class="theme-icon theme-icon-moon" aria-hidden="true">☾</span>
        </button>

        <button id="lock-btn" type="button" class="lock-btn" aria-label="Lock the archive">
          <span class="lock-icon" aria-hidden="true">⚿</span> <span class="lock-text">Lock</span>
        </button>
      </div>
    </header>

    <!-- ============ Pan/zoom family-tree map ============ -->
    <main
      id="map-viewport"
      class="map-viewport"
      tabindex="0"
      aria-label="Family tree map. Drag to pan; scroll or pinch to zoom; use the buttons to zoom and recenter; arrow keys pan and plus or minus zoom."
    >
      <div id="map-canvas" class="map-canvas">
        <svg id="map-lines" class="map-lines" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"></svg>
        <!-- person cards + endcaps injected here by app.js -->
      </div>

      <div class="map-controls" role="group" aria-label="Map zoom controls">
        <button id="zoom-in" type="button" class="map-btn" aria-label="Zoom in">+</button>
        <button id="zoom-out" type="button" class="map-btn" aria-label="Zoom out">−</button>
        <button id="recenter" type="button" class="map-btn map-btn-recenter" aria-label="Recenter the tree">⤢</button>
      </div>

      <p id="footer-disclaimer" class="map-caption">Compiled from free public records; see sources on each person. A private family archive.</p>
    </main>
  </div>

  <!-- ============ Person modal ============ -->
  <dialog id="person-dialog" class="person-dialog" aria-labelledby="dialog-body">
    <button type="button" class="modal-close" aria-label="Close details">✕</button>
    <div id="dialog-body" class="dialog-body"></div>
  </dialog>

  <script src="js/data.enc.js?v=20260707n"></script>
  <script src="js/app.js?v=20260707n"></script>
</body>
</html>
